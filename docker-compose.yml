# Local development Postgres. Designed for Colima (no Docker Desktop).
#
# Start:   `colima start && yarn db:up`   (or `docker compose up -d`)
# Stop:    `yarn db:down`                  (or `docker compose down`)
#
# The host port is configurable so you can run alongside another local Postgres.
services:
  postgres:
    image: postgres:16-alpine
    container_name: notion-clone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notion}
      POSTGRES_DB: ${POSTGRES_DB:-notion_clone}
    ports:
      # HOST:CONTAINER — override the host side with POSTGRES_PORT if 5432 is taken.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - notion-clone-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notion} -d ${POSTGRES_DB:-notion_clone}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  notion-clone-pgdata:
